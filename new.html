<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>A Special Question For You</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background: linear-gradient(135deg, #ffe5ec, #ffc2d1);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
        }
        .card {
            background: white;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            text-align: center;
            max-width: 450px;
            width: 90%;
            position: relative;
        }
        h1 {
            color: #ff4d6d;
            font-size: 2rem;
            margin-bottom: 30px;
            line-height: 1.4;
        }
        .btn-container {
            display: flex;
            justify-content: center;
            gap: 20px;
            height: 50px;
            position: relative;
        }
        button {
            padding: 12px 35px;
            font-size: 1.1rem;
            font-weight: bold;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            transition: transform 0.1s ease;
        }
        #yesBtn {
            background-color: #ff4d6d;
            color: white;
            box-shadow: 0 4px 15px rgba(255, 77, 109, 0.4);
        }
        #yesBtn:hover {
            transform: scale(1.05);
            background-color: #ff758f;
        }
        #noBtn {
            background-color: #6c757d;
            color: white;
            position: absolute;
            /* Default positioning on the right side of the container */
            left: calc(50% + 10px); 
        }
    </style>
</head>
<body>

    <div class="card">
        <h1>Will you go on a movie date with me? 🎬🍿</h1>
        <div class="btn-container">
            <button id="yesBtn" style="position: absolute; right: calc(50% + 10px);">Yes!</button>
            <button id="noBtn">No</button>
        </div>
    </div>

    <script>
        const noBtn = document.getElementById('noBtn');

        function moveButton() {
            // Get screen dimensions minus button size so it doesn't run off screen edges
            const padding = 20;
            const maxX = window.innerWidth - noBtn.offsetWidth - padding;
            const maxY = window.innerHeight - noBtn.offsetHeight - padding;

            // Generate random positions
            const randomX = Math.floor(Math.random() * maxX);
            const randomY = Math.floor(Math.random() * maxY);

            // Switch to absolute positioning so it can float anywhere on the screen
            noBtn.style.position = 'fixed';
            noBtn.style.left = randomX + 'px';
            noBtn.style.top = randomY + 'px';
        }

        // Run away on desktop (mouse hover)
        noBtn.addEventListener('mouseover', moveButton);
        
        // Run away on mobile (tap/touch)
        noBtn.addEventListener('touchstart', (e) => {
            e.preventDefault(); // Prevents clicking it on mobile
            moveButton();
        });

        // What happens when they click Yes
        document.getElementById('yesBtn').addEventListener('click', () => {
            alert('Theaters are cramped and they give you a fright, But Ritisha, I\'m the only one you\'ll need to hold tight.');
        });
    </script>

</body>
</html>
